name: poll-leaderboard

# 경기 종료 직후 리더보드 자동 갱신 + GitHub Pages 배포:
#   스케줄로 폴러 실행 → web/ 를 Pages 아티팩트로 업로드 → 배포. (봇 커밋 없이 Pages 갱신)
# API 키는 repo Secret(PUBG_API_KEY)로만 주입한다 (절대 커밋 금지).

on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (GitHub Actions 최소 주기 5분)
  workflow_dispatch: {}       # 수동 실행 버튼
  push:
    branches: [main]          # 코드 변경 시에도 재배포

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Poll PUBG API and build leaderboard
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}
          EVENT_CONFIG: config/ewc2026.json
        run: python -m src.poll --once   # stdlib만 사용 — pip install 불필요
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
