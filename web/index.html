<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PUBG Esports — Live Leaderboard</title>
<style>
  :root {
    --bg: #0e1116; --panel: #171b22; --panel-2: #1f242d; --line: #2a303a;
    --fg: #e6edf3; --muted: #8b95a4; --accent: #f5a623; --accent-2: #3b82f6;
    --gold: #f5c542; --silver: #c7cfdb; --bronze: #cd8b52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
  }
  header {
    padding: 20px 24px; border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 8px 24px; align-items: baseline;
  }
  header h1 { font-size: 20px; margin: 0; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  .meta { color: var(--muted); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
  .meta b { color: var(--fg); font-weight: 600; }
  main { padding: 20px 24px 60px; max-width: 1100px; margin: 0 auto; }
  .phases { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .phases button {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
    padding: 10px 22px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600;
  }
  .phases button[aria-selected="true"] { background: var(--panel-2); color: var(--fg); border-color: var(--accent-2); box-shadow: inset 0 -2px 0 var(--accent-2); }
  .phases button:disabled { opacity: .45; cursor: not-allowed; }
  .phases small { font-weight: 400; color: var(--muted); }
  .days { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .days button {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
    padding: 7px 15px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .days button[aria-selected="true"] { background: var(--accent); color: #131722; border-color: var(--accent); font-weight: 700; }
  .days button.total[aria-selected="true"] { background: var(--accent-2); color: #fff; border-color: var(--accent-2); }
  .matches { display: flex; gap: 6px; flex-wrap: wrap; margin: -4px 0 14px; }
  .matches:empty { display: none; }
  .matches button {
    background: transparent; color: var(--muted); border: 1px solid var(--line);
    padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 12.5px;
  }
  .matches button[aria-selected="true"] { color: var(--fg); border-color: var(--accent); background: var(--panel-2); }
  .matches small { color: var(--muted); }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tabs button {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
    padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .tabs button[aria-selected="true"] { background: var(--panel-2); color: var(--fg); border-color: var(--accent); }
  .tabs .dl { margin-left: auto; background: #14512c; color: #d7f5e2; border-color: #1f7a43; font-weight: 600; }
  .tabs .dl:hover { background: #1a6637; }
  .banner {
    background: #3a2a12; color: #f5c542; border: 1px solid #5a4420;
    padding: 9px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  }
  .banner:empty { display: none; }
  .viewhint { color: var(--muted); font-size: 13px; margin: 0 0 12px; }
  .viewhint b { color: var(--fg); }
  tr.cutline td { padding: 0; }
  tr.cutline div {
    border-top: 2px dashed var(--accent-2); color: var(--accent-2);
    font-size: 11.5px; font-weight: 700; padding: 5px 12px; letter-spacing: .5px;
  }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
  th, td { padding: 11px 12px; text-align: right; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  th:nth-child(-n+2), td:nth-child(-n+2) { text-align: left; }
  tbody tr:hover { background: var(--panel-2); }
  tbody tr:last-child td { border-bottom: 0; }
  .rank { font-variant-numeric: tabular-nums; color: var(--muted); width: 40px; }
  .top1 .rank { color: var(--gold); font-weight: 700; }
  .top2 .rank { color: var(--silver); font-weight: 700; }
  .top3 .rank { color: var(--bronze); font-weight: 700; }
  .tag { font-weight: 700; letter-spacing: .3px; }
  .total { font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); }
  .adj { font-size: 11px; font-weight: 700; color: var(--accent-2); cursor: help; }
  td.num { font-variant-numeric: tabular-nums; }
  .players { color: var(--muted); font-size: 12.5px; }
  .err { color: #ff6b6b; padding: 16px; }
  footer { color: var(--muted); font-size: 12px; text-align: center; padding: 24px; }
</style>
</head>
<body>
<header>
  <h1><span>PUBG</span> Esports — Live Leaderboard</h1>
  <div class="meta" id="meta"></div>
</header>
<main>
  <div class="banner" id="banner"></div>
  <div class="phases" id="phases" role="tablist"></div>
  <div class="days" id="days" role="tablist"></div>
  <div class="matches" id="matches" role="tablist"></div>
  <p class="viewhint" id="viewhint"></p>
  <div class="tabs" role="tablist">
    <button id="tab-teams" role="tab" aria-selected="true" onclick="setTab('teams')">팀 순위</button>
    <button id="tab-players" role="tab" aria-selected="false" onclick="setTab('players')">선수 (킬)</button>
    <button class="dl" onclick="downloadResults()" title="현재 보고 있는 뷰를 엑셀로 저장">⬇ 엑셀 다운로드</button>
  </div>
  <div id="view"></div>
</main>
<footer>경기 종료 직후 PUBG API 데이터 기준 · 자동 갱신 (GitHub Actions)</footer>
<script src="vendor/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
